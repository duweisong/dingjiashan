name: Daily Signal V4.3.1 (Auto-Data)

on:
  schedule:
    # 18:00 Beijing time = 10:00 UTC (market close + 3h, data fully settled)
    - cron: '0 10 * * 1-5'
  workflow_dispatch:  # manual trigger

jobs:
  run-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          pip install numpy pandas baostock requests
      
      - name: Create cache dir
        run: mkdir -p .strategy_cache
      
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: .strategy_cache
          key: stock-cache-${{ github.run_id }}
          restore-keys: |
            stock-cache-
      
      - name: Run V4.3.1 Signal
        run: python _v4_10stock_backtest.py
      
      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add daily_reports/
          git diff --staged --quiet || (git commit -m "daily signal $(date +%Y-%m-%d) [auto]" && git push)
      - name: PushPlus
        if: env.PUSHPLUS_TOKEN != ''
        env:
          PUSHPLUS_TOKEN: ${{ secrets.PUSHPLUS_TOKEN }}
        run: python -c "import requests,os;from pathlib import Path;rpt=Path('daily_reports/LATEST.md');c=rpt.read_text(encoding='utf-8');lines=c.split(chr(10));title=lines[0].lstrip('# ') if lines else 'Signal';body=chr(10).join(lines[:40]);r=requests.post('https://www.pushplus.plus/send',json={'token':os.environ['PUSHPLUS_TOKEN'],'title':title,'content':body,'template':'markdown'},timeout=15).json();print('[OK]' if r.get('code')==200 else f'[FAIL]')"
